<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 棋盘格图案 -->
    <pattern id="checkerboard" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#ffffff"/>
      <rect x="20" width="20" height="20" fill="#000000"/>
      <rect y="20" width="20" height="20" fill="#000000"/>
      <rect x="20" y="20" width="20" height="20" fill="#ffffff"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="#e0e0e0"/>
  
  <!-- 标题 -->
  <text x="200" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">黑白棋盘格</text>
  
  <!-- 棋盘格区域 -->
  <rect x="50" y="50" width="300" height="200" fill="url(#checkerboard)" stroke="#333" stroke-width="2"/>
  
  <!-- 网格线标注 -->
  <line x1="50" y1="150" x2="350" y2="150" stroke="#ff0000" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="200" y1="50" x2="200" y2="250" stroke="#ff0000" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- 标注文字 -->
  <text x="200" y="280" text-anchor="middle" font-size="12" fill="#333">每个方格 20x20 像素</text>
  
  <!-- 角点标注 -->
  <circle cx="50" cy="50" r="4" fill="#ff0000"/>
  <circle cx="350" cy="50" r="4" fill="#ff0000"/>
  <circle cx="50" cy="250" r="4" fill="#ff0000"/>
  <circle cx="350" cy="250" r="4" fill="#ff0000"/>
</svg>
