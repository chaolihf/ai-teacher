<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#1a1a2e"/>
  
  <!-- 标题 -->
  <text x="200" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#eee">简单几何图形</text>
  
  <!-- 红色圆形 -->
  <circle cx="100" cy="100" r="50" fill="#ff4444" stroke="#fff" stroke-width="2"/>
  
  <!-- 绿色方形 -->
  <rect x="175" y="75" width="75" height="75" fill="#44ff44" stroke="#fff" stroke-width="2"/>
  
  <!-- 蓝色三角形 -->
  <polygon points="300,60 340,140 260,140" fill="#4444ff" stroke="#fff" stroke-width="2"/>
  
  <!-- 黄色星形 -->
  <polygon points="100,180 110,210 145,210 117,230 128,265 100,245 72,265 83,230 55,210 90,210" fill="#ffff00" stroke="#fff" stroke-width="2"/>
  
  <!-- 青色菱形 -->
  <polygon points="200,180 230,205 200,230 170,205" fill="#00ffff" stroke="#fff" stroke-width="2"/>
  
  <!-- 品红六边形 -->
  <polygon points="300,205 320,195 340,205 340,225 320,235 300,225" fill="#ff00ff" stroke="#fff" stroke-width="2"/>
  
  <!-- 标注 -->
  <text x="100" y="285" text-anchor="middle" font-size="11" fill="#ff4444">圆形</text>
  <text x="212" y="285" text-anchor="middle" font-size="11" fill="#44ff44">方形</text>
  <text x="300" y="285" text-anchor="middle" font-size="11" fill="#4444ff">三角</text>
</svg>
