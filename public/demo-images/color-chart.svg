<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- 标题 -->
  <text x="200" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">标准色卡</text>
  
  <!-- 第一行 - 原色 -->
  <rect x="20" y="50" width="100" height="60" fill="#ff0000" stroke="#333" stroke-width="1"/>
  <text x="70" y="85" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">R:255 G:0 B:0</text>
  
  <rect x="150" y="50" width="100" height="60" fill="#00ff00" stroke="#333" stroke-width="1"/>
  <text x="200" y="85" text-anchor="middle" font-size="12" fill="#000" font-weight="bold">R:0 G:255 B:0</text>
  
  <rect x="280" y="50" width="100" height="60" fill="#0000ff" stroke="#333" stroke-width="1"/>
  <text x="330" y="85" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">R:0 G:0 B:255</text>
  
  <!-- 第二行 - 间色 -->
  <rect x="20" y="130" width="100" height="60" fill="#ffff00" stroke="#333" stroke-width="1"/>
  <text x="70" y="165" text-anchor="middle" font-size="12" fill="#000" font-weight="bold">R:255 G:255 B:0</text>
  
  <rect x="150" y="130" width="100" height="60" fill="#ff00ff" stroke="#333" stroke-width="1"/>
  <text x="200" y="165" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">R:255 G:0 B:255</text>
  
  <rect x="280" y="130" width="100" height="60" fill="#00ffff" stroke="#333" stroke-width="1"/>
  <text x="330" y="165" text-anchor="middle" font-size="12" fill="#000" font-weight="bold">R:0 G:255 B:255</text>
  
  <!-- 第三行 - 黑白灰 -->
  <rect x="20" y="210" width="100" height="60" fill="#000000" stroke="#333" stroke-width="1"/>
  <text x="70" y="245" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">R:0 G:0 B:0</text>
  
  <rect x="150" y="210" width="100" height="60" fill="#808080" stroke="#333" stroke-width="1"/>
  <text x="200" y="245" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">R:128 G:128 B:128</text>
  
  <rect x="280" y="210" width="100" height="60" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="330" y="245" text-anchor="middle" font-size="12" fill="#000" font-weight="bold">R:255 G:255 B:255</text>
</svg>
